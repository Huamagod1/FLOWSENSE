# Base de datos
spring.datasource.url=jdbc:mysql://mysql:3306/flowsense_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=flowsense
spring.datasource.password=flowsense123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Servidor
server.port=8080

# Subida de archivos (videos MP4)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Nombre de la app
spring.application.name=flowsense-backend

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=-1