services:

  mysql:
    image: mysql:8.0
    container_name: flowsense-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: flowsense123
      MYSQL_DATABASE: flowsense_db
      MYSQL_USER: flowsense
      MYSQL_PASSWORD: flowsense123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - flowsense-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./Producto/backend
    container_name: flowsense-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/flowsense_db
      SPRING_DATASOURCE_USERNAME: flowsense
      SPRING_DATASOURCE_PASSWORD: flowsense123
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-dummy}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-dummy}
      MAIL_FROM: ${MAIL_FROM:-noreply@flowsense.local}
      PYTHON_BIN: python
      PYTHON_SCRIPT: /app/python/detector.py
      UPLOAD_DIR: /app/uploads
      RESULTS_DIR: /app/results
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./Producto/python:/app/python
      - uploads_data:/app/uploads
      - results_data:/app/results
    networks:
      - flowsense-net

  python:
    build: ./Producto/python
    container_name: flowsense-python
    restart: "no"
    volumes:
      - ./Producto/python:/app
      - uploads_data:/app/uploads
    networks:
      - flowsense-net

  frontend:
    build: ./Producto/frontend
    container_name: flowsense-frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./Producto/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - flowsense-net

volumes:
  mysql_data:
  uploads_data:
  results_data:

networks:
  flowsense-net:
    driver: bridge