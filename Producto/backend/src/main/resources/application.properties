# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/flowsense?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=flowsense
spring.datasource.password=flowsense123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Servidor
server.port=8080

# Subida de archivos (videos MP4)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Directorios de procesamiento
upload.dir=uploads/
results.dir=results/

# Python
python.bin=python3
python.script=Producto/python/detector.py

# Nombre de la app
spring.application.name=flowsense-backend

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=-1