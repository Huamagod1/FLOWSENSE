spring:
  application:
    name: flowsense-backend

  # ── Base de datos ───────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:flowsense_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:flowsense}
    password: ${DB_PASSWORD:flowsense123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 60000
      initialization-fail-timeout: -1

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Email ────────────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Subida de archivos (videos MP4 hasta 500 MB) ─────────────────────────────
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# ── Servidor ────────────────────────────────────────────────────────────────────
server:
  port: 8080

# ── Configuración propia de FlowSense ──────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-CHANGE-in-production-min-32-chars!!}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}

  mail:
    from: ${MAIL_FROM:noreply@flowsense.cl}

  # Directorios de trabajo (deben existir en el sistema de archivos)
  upload-dir: ${UPLOAD_DIR:/app/uploads}
  results-dir: ${RESULTS_DIR:/app/results}
  zones-dir: ${ZONES_DIR:/app/zones}

  # Python — invocado via ProcessBuilder
  python:
    bin: ${PYTHON_BIN:python3}
    script: ${PYTHON_SCRIPT:/app/python/detector.py}

  # Frontend — usado en emails de invitación y recuperación
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
